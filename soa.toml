# soa — staged orchestration for local models.
#
# Pipeline: `soa run "task"` executes each [[stage]] in order. A stage sends
# its rendered prompt to its model and loops on tool calls until the model
# produces a final text answer, which becomes `{{previous}}` for the next
# stage. The last stage's answer is printed to stdout.

[settings]
searxng_url = "http://localhost:8888"
searxng_max_results = 8
default_max_turns = 16
request_timeout_secs = 600
# Tool results longer than this are truncated before entering the
# conversation (a recursive directory tree can exceed the context window).
max_tool_output_chars = 30000
# When real token usage (as reported by the provider) exceeds this fraction
# of a model's `context_tokens`, chat auto-compacts and stage loops truncate
# older tool results. 0 disables; only applies to models that declare
# `context_tokens`.
auto_compact_threshold = 0.8
# Transient provider failures (network errors, 408/429/5xx, interrupted
# streams) are retried this many times with exponential backoff before a
# turn errors — local servers restart and swap models often. 0 disables.
provider_retries = 3
# Project instructions: each file is discovered by walking up from the
# working directory and appended to every stage and agent system prompt.
# All candidates that exist are sourced in the listed order; missing ones
# are skipped.
# context_files = ["AGENTS.md", "SOA.md"]     # default: ["SOA.md"]

# ---------------------------------------------------------------------------
# Providers: OpenAI-compatible chat-completions endpoints.
# ---------------------------------------------------------------------------

[providers.spark]
base_url = "http://192.168.6.7:8000/v1"

[providers.threadripper]
base_url = "http://192.168.5.188:8000/v1"
# api_key = "${LMSTUDIO_API_KEY}"        # ${VAR} expands from the environment

# ---------------------------------------------------------------------------
# Models: a provider + model id + default sampling parameters.
# ---------------------------------------------------------------------------

[models.planner]
provider = "spark"
model = "qwen"
temperature = 0.7
# Declaring the context window enables the real-usage gauge in the chat
# status bar, auto-compaction, and mid-stage shedding of old tool results.
context_tokens = 131072

[models.coder]
provider = "threadripper"
model = "qwen-haiku"
temperature = 0.2
max_tokens = 8192
context_tokens = 131072

[models.reviewer]
provider = "spark"
model = "qwen"
temperature = 0.7

# ---------------------------------------------------------------------------
# MCP servers. transport = "stdio" spawns a process; "http" connects to a
# streamable-HTTP endpoint. `readonly_tools` marks tools as safe for
# read-only stages when the server doesn't annotate them with readOnlyHint.
# ---------------------------------------------------------------------------

[mcp.filesystem]
transport = "stdio"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "/Users/scott/personal"]
readonly_tools = ["read_file", "read_multiple_files", "list_directory", "search_files", "get_file_info", "directory_tree"]

# [mcp.remote]
# transport = "http"
# url = "http://localhost:9000/mcp"
# auth_token = "${REMOTE_MCP_TOKEN}"
# headers = { "x-team" = "soa" }

# ---------------------------------------------------------------------------
# Agents: subagents that stages (or other agents) can delegate tasks to via
# `subagents = [...]`. Each becomes a tool `agent__<name>` for the caller's
# model; the agent runs its own tool loop and returns its final answer.
# `description` tells the calling model when to delegate.
# ---------------------------------------------------------------------------

[agents.researcher]
model = "planner"
mode = "read_only"
mcp = ["filesystem"]
web_search = true
description = "Answers research questions about the codebase or from the web without changing anything. Good for looking up APIs, finding relevant files, or summarizing docs."
system_prompt = """
You are a focused researcher. Answer the task thoroughly but concisely
using your tools. Do not make any changes.
"""
max_turns = 12

# ---------------------------------------------------------------------------
# Stages, executed in order.
#   mode = "read_only"  -> only read-only tools are exposed to the model
#   mode = "read_write" -> all tools from the listed MCP servers
# Prompt templates may use {{input}}, {{previous}}, and {{stage.<name>}}.
# ---------------------------------------------------------------------------

[[stage]]
name = "research"
model = "planner"
mode = "read_only"
mcp = ["filesystem"]
web_search = true
system_prompt = """
You are a research assistant. Investigate the task using the available tools.
Produce a concise briefing: relevant facts, relevant files, and a suggested
approach. Do not make any changes.
"""

[[stage]]
name = "implement"
model = "coder"
mode = "read_write"
# Built-in file tools rooted at the working directory: read_file, list_dir,
# glob, grep, plus write_file and edit_file in read_write mode. No MCP
# server needed for file access.
files = true
mcp = ["filesystem"]
subagents = ["researcher"]
skills = ["careful-editing"]     # from skills/ next to this file (settings.skills_dir)
shell = true                     # unrestricted shell (stage is read_write anyway)
# Pause writes and non-cargo shell commands for interactive y/n/always
# approval; cargo builds and researcher delegations run unprompted.
# Non-interactive runs deny gated calls instead of prompting.
require_approval = true
auto_approve = ["shell cargo *", "agent__researcher"]
max_turns = 32
system_prompt = "You are a careful engineer. Complete the task and verify it builds, then summarize what you changed. Delegate research questions to the researcher agent instead of exploring yourself."
prompt = """
# Task
{{input}}

# Research briefing
{{stage.research}}

# Latest input (plan or review feedback)
{{previous}}
"""

# The reviewer can send work back: reprompting `implement` re-runs it with
# the instructions as {{previous}}, and review runs again afterwards since
# the pipeline resumes in declared order. `can_reprompt = ["review"]` also
# lets it re-run itself (e.g. to re-inspect after reading more files).
[[stage]]
name = "review"
model = "reviewer"
mode = "read_only"
mcp = ["filesystem"]
can_reprompt = ["implement", "review"]
# The shell grant is independent of mode: review can run the test suite
# without gaining any file-write tools.
shell = true
shell_allow = ["cargo check*", "cargo test*", "cargo build*", "cargo clippy*", "git status*", "git diff*", "git log*"]
system_prompt = """
You are a code reviewer. Inspect the work described below using the
read-only tools, and verify it by running the build and tests with the
shell tool. If more work is required, call reprompt_stage with specific,
actionable instructions for the `implement` stage (include failing test
output). If the work is complete and correct, reply with a short summary
of what was accomplished.
"""

# ---------------------------------------------------------------------------
# Hooks: shell commands bound to tool-call events. `match` uses the same
# `*`-wildcard descriptors as auto_approve (`edit_file *`, `shell cargo *`,
# `agent__researcher`). A pre_tool hook that exits non-zero blocks the call
# (before any approval prompt); a post_tool hook that exits non-zero has
# its output appended to the tool result so the model sees it. Hooks get a
# JSON payload on stdin and SOA_EVENT / SOA_TOOL / SOA_DESCRIPTOR /
# SOA_PATHS in the environment.
# ---------------------------------------------------------------------------

# [[hooks]]
# event = "post_tool"                 # lint after every native file edit
# match = "edit_file *"
# command = "cargo fmt --check 2>&1 | head -20"

# [[hooks]]
# event = "pre_tool"                  # protect a directory from writes
# match = "write_file secrets/*"
# command = "echo 'secrets/ is off limits' >&2; exit 1"

# ---------------------------------------------------------------------------
# Workflows: named pipelines over the stage library. `soa run` uses the
# workflow named "default" (or settings.default_workflow); pick another
# with `soa run -w quickfix "task"`. `soa stages` lists them.
# ---------------------------------------------------------------------------

[workflows.default]
description = "research, implement, review"
stages = ["research", "implement", "review"]

[workflows.quickfix]
description = "skip research for small, well-understood changes"
stages = ["implement", "review"]
